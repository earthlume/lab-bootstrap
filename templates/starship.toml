# lab.hoens.fun — starship prompt config
# Minimal: hostname, directory, git, exit code, command duration

# Prompt format
format = """
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

# Right prompt: nothing (keep it clean)
right_format = ""

# Don't add blank line between prompts
add_newline = false

[hostname]
ssh_only = true
format = "[$ssh_symbol$hostname]($style) "
style = "bold #008080"
ssh_symbol = "🔗 "

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold #5fafaf"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "#87af87"
symbol = " "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "#d7875f"

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "#878787"

[character]
success_symbol = "[❯](bold #008080)"
error_symbol = "[❯](bold #d75f5f)"

# Explicitly disable heavy/unnecessary modules
[python]
disabled = true

[nodejs]
disabled = true

[docker_context]
disabled = true

